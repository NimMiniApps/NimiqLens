server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets are content-addressed — safe to cache long-term.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must stay fresh so clients pick up new hashed bundles after deploy.
    # index.html and version.json must stay fresh so clients pick up new hashed bundles.
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Single-page app: let Vue Router handle unknown paths client-side.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
