name: Build and push container images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: image
        run: echo "owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/nimlens-backend:latest
            ghcr.io/${{ steps.image.outputs.owner }}/nimlens-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: image
        run: echo "owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Keep a production-safe default: an empty value makes the SPA request
      # /api from the frontend nginx host, which only serves index.html.
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'https://api-nimiqlens.maestroi.cc' }}
            VITE_APP_COMMIT_HASH=${{ github.sha }}
            VITE_APP_BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/nimlens-frontend:latest
            ghcr.io/${{ steps.image.outputs.owner }}/nimlens-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
